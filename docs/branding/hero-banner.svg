  <text x="790" y="228" fill="#38bdf8" font-family="Arial, Helvetica, sans-serif" font-size="20">$ ailoop ps</text>
  <text x="790" y="268" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="18">ID             State         Prog</text>
